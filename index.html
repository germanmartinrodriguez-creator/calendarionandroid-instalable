<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calendario Barcelona</title>
<link rel="manifest" href="./manifest.json?v=repo-final-1">
<link rel="icon" href="./icons/icon-192.png?v=repo-final-1">
<meta name="theme-color" content="#b40d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calendario Barcelona">
<style>
:root{--red:#f43f46;--redDark:#b40d1a;--redDeep:#7f050c;--blue:#1f6ff2;--green:#21a84a;--orange:#f47721;--yellow:#fff200;--ink:#121827;--muted:#6b7280;--card:#fff;--bg:#eef2f7;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
.app{width:min(430px,100%);margin:0 auto;padding:12px 10px 22px}.header{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#cf1c2b,#980711);color:#fff;border-radius:20px 20px 8px 8px;padding:13px 14px;box-shadow:0 10px 24px rgba(150,10,20,.25)}
.header img{width:58px;height:58px;border-radius:14px;background:#fff;object-fit:contain;box-shadow:0 2px 8px rgba(0,0,0,.25)}.header h1{margin:0;font-size:20px;line-height:1.05}.header p{margin:4px 0 0;font-size:12px;opacity:.95}
.panel{background:#fff;border-radius:0 0 20px 20px;padding:10px 12px 14px;box-shadow:0 12px 28px rgba(17,24,39,.12)}.topline{display:flex;align-items:center;justify-content:space-between;margin:6px 0 10px}.monthTitle{font-weight:900;font-size:20px}.nav{display:flex;gap:8px;align-items:center}.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:800;color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.15);font-size:14px}.btn:active{transform:translateY(1px)}.blue{background:var(--blue)}.green{background:var(--green)}.orange{background:var(--orange)}.dark{background:#374151}.install{display:none;background:#111827;margin-left:4px}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}.dow,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.dow div{font-weight:900;color:#64748b;font-size:13px;padding:4px 0;text-align:center}.day{height:45px;border-radius:10px;background:#fff;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;position:relative;box-shadow:0 1px 3px rgba(17,24,39,.08)}.empty{height:45px}.weekend{background:var(--red);color:white;border-color:#e63a41}.holiday{background:var(--redDark)!important;color:#fff!important;border-color:#8d0710!important}.vacation{background:var(--yellow)!important;color:#111827!important;border-color:#d8c900!important}.today{background:var(--blue)!important;color:#fff!important;border-color:#0b4ed9!important;box-shadow:0 0 0 3px rgba(31,111,242,.22)}.past:after{content:"";position:absolute;left:8px;right:8px;top:50%;height:2px;background:rgba(0,0,0,.45);transform:rotate(-6deg)}.today:after{background:rgba(255,255,255,.75)}.tag{position:absolute;bottom:3px;font-size:8px;font-weight:900}.legend{display:flex;gap:12px;justify-content:center;align-items:center;margin:13px 0 2px;font-size:12px;color:#4b5563;flex-wrap:wrap}.dot{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:-1px}.infoBox{display:none;margin:12px auto 0;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px;text-align:left;box-shadow:0 8px 22px rgba(17,24,39,.10);max-width:100%}.infoBox h3{margin:0 0 5px;font-size:16px}.infoBox p{margin:0;color:#4b5563;font-size:13px;line-height:1.35}
.yearView{display:none;position:fixed;inset:0;background:#fff;z-index:20;overflow:auto;padding:14px 18px 26px}.yearHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}.yearHeader h2{margin:0;font-size:20px}.yearGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.mini{border:1px solid #d6dbe3;border-radius:12px;padding:8px;background:#fff}.mini h3{text-align:center;margin:0 0 6px;font-size:15px}.miniDow,.miniGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}.miniDow div{background:#0b0b0b;color:#fff;text-align:center;font-weight:800;font-size:10px;padding:3px 0}.miniDay{height:20px;border:1px solid #e5e7eb;text-align:center;font-size:11px;line-height:19px}.miniEmpty{height:20px}.miniWeekend{background:#e24b4b!important;color:#fff}.miniHoliday{background:#a80d16!important;color:#fff}.miniVacation{background:#fff533!important;color:#111}.miniToday{outline:2px solid #1f6ff2;outline-offset:-2px}.miniNotes{font-size:10px;color:#4b5563;margin-top:5px;min-height:18px;text-align:left}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 14px;border-radius:12px;box-shadow:0 10px 22px rgba(0,0,0,.24);display:none;z-index:50;font-size:14px;max-width:92%;text-align:center}
@media(max-width:700px){.yearGrid{grid-template-columns:1fr}.yearView{padding:12px 10px 20px}.miniDay{height:28px;line-height:27px;font-size:13px}.miniDow div{font-size:11px}.yearHeader{position:sticky;top:0;background:#fff;padding:6px 0;z-index:2}.actions{grid-template-columns:1fr 1fr}.actions .orange{grid-column:1/3}}
@media print{body{background:white}.app{display:none}.yearView{display:block!important;position:static;inset:auto;padding:0;overflow:visible}.yearHeader{margin-bottom:8px}.yearHeader .btn{display:none}.yearHeader h2{font-size:20px}.yearGrid{grid-template-columns:repeat(3,1fr);gap:8px}.mini{break-inside:avoid;border:1px solid #ccc;padding:5px}.mini h3{font-size:13px;margin-bottom:3px}.miniDay{height:16px;line-height:15px;font-size:9px}.miniDow div{font-size:8px;padding:2px 0}.miniNotes{font-size:8px}.toast{display:none!important}@page{size:A4 portrait;margin:8mm}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header"><img src="./icono.png?v=repo-final-1" alt="Icono" onerror="this.src='./icons/icon-192.png?v=repo-final-1'"><div><h1>Calendario Barcelona</h1><p>Festivos automáticos · Toques: vacaciones / festivo / borrar</p></div></div>
  <div class="panel">
    <div class="topline"><div class="monthTitle" id="title"></div><div class="nav"><button class="btn blue" onclick="prev()">◀</button><button class="btn green" onclick="todayBtn()">Hoy</button><button class="btn blue" onclick="next()">▶</button></div></div>
    <div class="actions"><button class="btn orange" onclick="showYear()">Ver / imprimir</button><button class="btn dark install" id="installBtn">Instalar</button><button class="btn dark" onclick="clearSelected()">Limpiar info</button></div>
    <div class="dow"><div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div></div>
    <div class="grid" id="cal"></div>
    <div class="legend"><span><i class="dot" style="background:var(--blue)"></i>Hoy</span><span><i class="dot" style="background:var(--red)"></i>Fin de semana</span><span><i class="dot" style="background:var(--redDark)"></i>Festivo</span><span><i class="dot" style="background:var(--yellow);border:1px solid #d8c900"></i>Vacas</span></div>
    <div class="infoBox" id="infoBox"><h3 id="infoTitle"></h3><p id="infoText"></p></div>
  </div>
</div>
<div class="yearView" id="yearView"><div class="yearHeader"><h2 id="yearTitle"></h2><div><button class="btn blue" onclick="window.print()">Imprimir</button> <button class="btn dark" onclick="closeYear()">Cerrar</button></div></div><div class="yearGrid" id="yearGrid"></div></div>
<div class="toast" id="toast"></div>
<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOW=['L','M','X','J','V','S','D'];
let now=new Date();let year=now.getFullYear(),month=now.getMonth(),selectedKey=null;const stateKey='cal_bcn_manual_states_v3';
function pad(n){return String(n).padStart(2,'0')}function key(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`}function todayKey(){let t=new Date();return key(t.getFullYear(),t.getMonth(),t.getDate())}function getStates(){try{return JSON.parse(localStorage.getItem(stateKey)||'{}')}catch(e){return {}}}function setStates(s){localStorage.setItem(stateKey,JSON.stringify(s))}
function easterDate(y){let a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31)-1,da=((h+l-7*m+114)%31)+1;return new Date(y,mo,da)}function addDays(dt,n){let x=new Date(dt);x.setDate(x.getDate()+n);return x}
function officialHolidays(y){let h={};function add(m,d,name){h[key(y,m-1,d)]=name}add(1,1,'Año Nuevo');add(1,6,'Reyes / Epifanía del Señor');add(5,1,'Día del Trabajo');add(6,24,'San Juan');add(8,15,'Asunción de la Virgen');add(9,11,'Diada Nacional de Cataluña');add(9,24,'La Mercè');add(10,12,'Fiesta Nacional Española');add(11,1,'Todos los Santos');add(12,6,'Día de la Constitución');add(12,8,'Inmaculada Concepción');add(12,25,'Navidad');add(12,26,'San Esteban');let e=easterDate(y);let vf=addDays(e,-2), lp=addDays(e,1), sp=addDays(e,50);h[key(vf.getFullYear(),vf.getMonth(),vf.getDate())]='Viernes Santo';h[key(lp.getFullYear(),lp.getMonth(),lp.getDate())]='Lunes de Pascua Florida';h[key(sp.getFullYear(),sp.getMonth(),sp.getDate())]='Segunda Pascua / Pascua Granada';return h}
function allHolidays(y){return {...officialHolidays(y-1),...officialHolidays(y),...officialHolidays(y+1)}}
function isPast(y,m,d){let t=new Date();t.setHours(0,0,0,0);let x=new Date(y,m,d);return x<t}function showToast(msg){let t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.style.display='none',2200)}
function showInfo(dateKey,title,text){selectedKey=dateKey;document.getElementById('infoTitle').textContent=title;document.getElementById('infoText').textContent=text;document.getElementById('infoBox').style.display='block'}function clearSelected(){document.getElementById('infoBox').style.display='none';selectedKey=null}
function handleDay(y,m,d){let k=key(y,m,d), official=allHolidays(y)[k]; if(official){showInfo(k,`${d} de ${MONTHS[m]} de ${y}`,`Festivo oficial: ${official}. Los festivos oficiales no se cambian con los toques.`);return}let s=getStates(); if(!s[k]){s[k]='vacation';setStates(s);showInfo(k,`${d} de ${MONTHS[m]} de ${y}`,'Marcado como vacaciones. Toca otra vez para convertirlo en festivo manual.');}else if(s[k]==='vacation'){s[k]='manualHoliday';setStates(s);showInfo(k,`${d} de ${MONTHS[m]} de ${y}`,'Marcado como festivo manual. Toca otra vez para borrar la marca.');}else{delete s[k];setStates(s);showInfo(k,`${d} de ${MONTHS[m]} de ${y}`,'Marca borrada.');}render()}
function render(){let cal=document.getElementById('cal');cal.innerHTML='';document.getElementById('title').textContent=`${MONTHS[month]} ${year}`;let first=(new Date(year,month,1).getDay()+6)%7, days=new Date(year,month+1,0).getDate(), hol=allHolidays(year), states=getStates();for(let i=0;i<first;i++){let e=document.createElement('div');e.className='empty';cal.appendChild(e)}for(let d=1;d<=days;d++){let dt=new Date(year,month,d), k=key(year,month,d), div=document.createElement('button');div.type='button';div.className='day';div.textContent=d;if(dt.getDay()===0||dt.getDay()===6)div.classList.add('weekend');if(hol[k])div.classList.add('holiday');if(states[k]==='vacation')div.classList.add('vacation');if(states[k]==='manualHoliday')div.classList.add('holiday');if(k===todayKey()){div.classList.add('today');let tag=document.createElement('span');tag.className='tag';tag.textContent='HOY';div.appendChild(tag)}if(isPast(year,month,d))div.classList.add('past');div.onclick=()=>handleDay(year,month,d);cal.appendChild(div)}}
function prev(){month--;if(month<0){month=11;year--}render();clearSelected()}function next(){month++;if(month>11){month=0;year++}render();clearSelected()}function todayBtn(){let t=new Date();year=t.getFullYear();month=t.getMonth();render();clearSelected()}
function miniMonth(y,m){let hol=allHolidays(y), states=getStates(), first=(new Date(y,m,1).getDay()+6)%7, days=new Date(y,m+1,0).getDate();let html=`<div class="mini"><h3>${MONTHS[m]}</h3><div class="miniDow">${DOW.map(x=>`<div>${x}</div>`).join('')}</div><div class="miniGrid">`;for(let i=0;i<first;i++)html+='<div class="miniEmpty"></div>';let notes=[];for(let d=1;d<=days;d++){let dt=new Date(y,m,d), k=key(y,m,d), cls='miniDay';if(dt.getDay()===0||dt.getDay()===6)cls+=' miniWeekend';if(hol[k]){cls+=' miniHoliday';notes.push(`${d} ${hol[k]}`)}if(states[k]==='vacation')cls+=' miniVacation';if(states[k]==='manualHoliday'){cls+=' miniHoliday';notes.push(`${d} Festivo manual`)}if(k===todayKey())cls+=' miniToday';html+=`<div class="${cls}">${d}</div>`}html+=`</div><div class="miniNotes">${notes.slice(0,3).join(' · ')}</div></div>`;return html}
function showYear(){document.getElementById('yearTitle').textContent=`Calendario Barcelona ${year}`;document.getElementById('yearGrid').innerHTML=Array.from({length:12},(_,m)=>miniMonth(year,m)).join('');document.getElementById('yearView').style.display='block'}function closeYear(){document.getElementById('yearView').style.display='none'}
let deferredPrompt=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;let b=document.getElementById('installBtn');b.style.display='inline-block';b.onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;b.style.display='none'}});window.addEventListener('appinstalled',()=>showToast('Aplicación instalada'));
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=repo-final-1').catch(()=>{}))}
render();
</script>
</body>
</html>
